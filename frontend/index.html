<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #09090f;
    --glass:     rgba(255,255,255,0.04);
    --glass-mid: rgba(255,255,255,0.07);
    --glass-hi:  rgba(255,255,255,0.10);
    --border:    rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.13);
    --text:      #eaeaf2;
    --text-dim:  #6b6b80;
    --text-mute: #3a3a4a;
    --accent:    #7c6cf8;
    --accent-2:  #a78bfa;
    --accent-glow: rgba(124,108,248,0.25);
    --user-glass: rgba(99,102,241,0.18);
    --user-border: rgba(124,108,248,0.3);
    --tool-glass: rgba(76,29,149,0.12);
    --tool-border: rgba(139,92,246,0.22);
    --error:     #f87171;
    --spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
    --smooth:    cubic-bezier(0.4, 0, 0.2, 1);
    --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono:      'SF Mono', 'JetBrains Mono', Menlo, monospace;
    --blur:      blur(24px);
    --blur-sm:   blur(12px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Ambient background orbs ─────────────────────────────────────────── */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(80px);
    animation: orbFloat 12s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(99,102,241,0.09) 0%, transparent 70%);
    top: -160px; left: -120px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%);
    bottom: -80px; right: 60px;
    animation-delay: -4s;
  }
  .orb-3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
    top: 40%; left: 40%;
    animation-delay: -8s;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── App shell ────────────────────────────────────────────────────────── */
  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ── Sidebar ──────────────────────────────────────────────────────────── */
  .sidebar {
    width: 232px;
    min-width: 232px;
    background: var(--glass);
    -webkit-backdrop-filter: var(--blur);
    backdrop-filter: var(--blur);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 14px 18px;
    gap: 28px;
    position: relative;
    z-index: 2;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 2px 6px;
  }
  .logo-mark {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 16px var(--accent-glow);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: box-shadow 0.4s var(--smooth), transform 0.3s var(--spring);
  }
  .logo-mark:hover { transform: scale(1.08); box-shadow: 0 0 28px var(--accent-glow); }
  .sidebar-logo span {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
  }

  .sidebar-section label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-mute);
    display: block;
    margin-bottom: 6px;
    padding: 0 8px;
  }

  .model-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .model-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.25s var(--smooth),
                border-color 0.25s var(--smooth),
                transform 0.3s var(--spring);
    position: relative;
    overflow: hidden;
  }
  .model-item::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: var(--glass-mid);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .model-item:hover::before { opacity: 1; }
  .model-item:hover { transform: scale(1.02); border-color: var(--border); }

  .model-item.active {
    background: rgba(124,108,248,0.12);
    border-color: rgba(124,108,248,0.28);
    transform: scale(1.02);
  }
  .model-item.active .model-dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .model-item.no-key { opacity: .3; pointer-events: none; }

  .model-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-mute);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .model-name {
    font-size: 12.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
  }

  .sidebar-spacer { flex: 1; }

  .new-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 9px 14px;
    background: var(--glass);
    -webkit-backdrop-filter: var(--blur-sm);
    backdrop-filter: var(--blur-sm);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.25s var(--smooth),
                border-color 0.25s var(--smooth),
                color 0.2s,
                transform 0.3s var(--spring);
  }
  .new-btn:hover {
    background: var(--glass-mid);
    border-color: var(--border-hi);
    color: var(--text);
    transform: scale(1.02);
  }
  .new-btn:active { transform: scale(0.98); }

  /* ── Chat area ────────────────────────────────────────────────────────── */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: transparent;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
  }

  /* ── Empty state ──────────────────────────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    user-select: none;
    animation: fadeUp 0.6s var(--spring) both;
  }
  .empty-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 32px var(--accent-glow), 0 0 60px rgba(124,108,248,0.1);
    margin-bottom: 6px;
    animation: iconPulse 4s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 0 32px var(--accent-glow), 0 0 60px rgba(124,108,248,0.1); }
    50%       { box-shadow: 0 0 48px rgba(124,108,248,0.4), 0 0 80px rgba(124,108,248,0.15); }
  }
  .empty-state h2 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.8px;
    background: linear-gradient(135deg, var(--text) 30%, rgba(234,234,242,0.4));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .empty-state p {
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: 0.01em;
  }

  /* ── Message rows ─────────────────────────────────────────────────────── */
  .msg-row {
    display: flex;
    padding: 5px 36px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
    animation: msgIn 0.4s var(--spring) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user      { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg-row.tool-row  { justify-content: flex-start; }

  /* ── User bubble ──────────────────────────────────────────────────────── */
  .user-bubble {
    background: var(--user-glass);
    -webkit-backdrop-filter: var(--blur-sm);
    backdrop-filter: var(--blur-sm);
    border: 1px solid var(--user-border);
    color: #d4d0ff;
    padding: 10px 16px;
    border-radius: 18px 18px 4px 18px;
    max-width: 68%;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: 0 2px 16px rgba(99,102,241,0.1);
  }

  /* ── Assistant message ────────────────────────────────────────────────── */
  .assistant-wrap {
    display: flex;
    gap: 12px;
    max-width: 82%;
    align-items: flex-start;
  }
  .assistant-avatar {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 10px var(--accent-glow);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: white;
    letter-spacing: -.3px;
  }
  .assistant-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
    min-width: 0;
  }

  /* Markdown */
  .assistant-body p { margin: 0 0 10px; }
  .assistant-body p:last-child { margin-bottom: 0; }
  .assistant-body h1, .assistant-body h2, .assistant-body h3 {
    margin: 18px 0 7px; font-weight: 600; color: var(--text);
  }
  .assistant-body h1 { font-size: 18px; }
  .assistant-body h2 { font-size: 15px; }
  .assistant-body h3 { font-size: 13.5px; }
  .assistant-body ul, .assistant-body ol { padding-left: 20px; margin: 6px 0 10px; }
  .assistant-body li { margin-bottom: 3px; }
  .assistant-body code {
    font-family: var(--mono);
    font-size: 12.5px;
    background: rgba(124,108,248,0.12);
    border: 1px solid rgba(124,108,248,0.2);
    border-radius: 5px;
    padding: 1px 5px;
    color: #c4b5fd;
  }
  .assistant-body pre {
    background: rgba(0,0,0,0.35);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .assistant-body pre code {
    background: none; border: none; padding: 0;
    font-size: 12.5px; color: inherit; border-radius: 0;
  }
  .assistant-body blockquote {
    border-left: 2px solid var(--accent);
    padding-left: 14px;
    color: var(--text-dim);
    margin: 8px 0;
  }
  .assistant-body table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .assistant-body th, .assistant-body td {
    border: 1px solid var(--border); padding: 6px 10px; font-size: 13px;
  }
  .assistant-body th { background: var(--glass); font-weight: 600; }
  .assistant-body a { color: var(--accent-2); text-decoration: none; }
  .assistant-body a:hover { text-decoration: underline; }
  .assistant-body strong { color: #f0f0f8; font-weight: 600; }
  .assistant-body hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    border-radius: 1px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Tool card ────────────────────────────────────────────────────────── */
  .tool-card {
    background: var(--tool-glass);
    -webkit-backdrop-filter: var(--blur-sm);
    backdrop-filter: var(--blur-sm);
    border: 1px solid var(--tool-border);
    border-radius: 10px;
    overflow: hidden;
    max-width: 580px;
    width: 100%;
    font-size: 12.5px;
    box-shadow: 0 2px 20px rgba(139,92,246,0.06);
    transition: box-shadow 0.3s var(--smooth);
  }
  .tool-card:hover { box-shadow: 0 4px 28px rgba(139,92,246,0.12); }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 13px;
    background: rgba(139,92,246,0.1);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .tool-header:hover { background: rgba(139,92,246,0.18); }
  .tool-icon { font-size: 12px; opacity: .7; }
  .tool-name { font-weight: 600; color: #c4b5fd; font-family: var(--mono); font-size: 12px; }
  .tool-args-preview {
    color: var(--text-mute); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: var(--mono); font-size: 11.5px;
  }
  .tool-chevron {
    color: var(--text-dim); font-size: 9px;
    transition: transform 0.3s var(--spring); margin-left: auto;
  }
  .tool-card.open .tool-chevron { transform: rotate(90deg); }

  .tool-body { display: none; }
  .tool-card.open .tool-body { display: block; }

  .tool-args {
    padding: 8px 13px;
    border-bottom: 1px solid rgba(139,92,246,0.12);
    font-family: var(--mono);
    font-size: 12px;
  }
  .tool-arg-row { display: flex; gap: 10px; margin-bottom: 2px; }
  .tool-arg-key { color: #a78bfa; flex-shrink: 0; }
  .tool-arg-val { color: var(--text); white-space: pre-wrap; word-break: break-all; }

  .tool-result {
    padding: 8px 13px;
    font-family: var(--mono);
    font-size: 12px;
    color: #86efac;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-result.loading { color: var(--text-dim); font-style: italic; }
  .tool-result::-webkit-scrollbar { width: 3px; }
  .tool-result::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* ── Error ────────────────────────────────────────────────────────────── */
  .error-msg {
    padding: 10px 14px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    backdrop-filter: var(--blur-sm);
    border-radius: 10px;
    color: var(--error);
    font-size: 13px;
    max-width: 80%;
  }

  /* ── Input bar ────────────────────────────────────────────────────────── */
  .input-bar {
    padding: 12px 36px 22px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--glass);
    -webkit-backdrop-filter: var(--blur);
    backdrop-filter: var(--blur);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.3s var(--smooth),
                background 0.3s var(--smooth),
                box-shadow 0.3s var(--smooth);
  }
  .input-wrap:focus-within {
    background: var(--glass-mid);
    border-color: rgba(124,108,248,0.4);
    box-shadow: 0 0 0 3px rgba(124,108,248,0.08), 0 4px 24px rgba(0,0,0,0.2);
  }

  textarea#input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.55;
    resize: none;
    max-height: 200px;
    min-height: 22px;
    overflow-y: auto;
  }
  textarea#input::placeholder { color: var(--text-mute); }
  textarea#input::-webkit-scrollbar { width: 3px; }
  textarea#input::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  #sendBtn {
    width: 34px; height: 34px;
    border-radius: 9px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 2px 12px var(--accent-glow);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.3s var(--spring),
                box-shadow 0.3s var(--smooth),
                opacity 0.2s;
  }
  #sendBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(124,108,248,0.5);
  }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: .35; cursor: default; transform: none; box-shadow: none; }
  #sendBtn.stop {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    box-shadow: 0 2px 12px rgba(220,38,38,0.3);
  }
  #sendBtn.stop:hover { box-shadow: 0 4px 20px rgba(220,38,38,0.5); }
</style>
</head>
<body>

<!-- Ambient orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="2.5" fill="white"/>
          <line x1="7" y1="1" x2="7" y2="3.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="10.5" x2="7" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="7" x2="3.5" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10.5" y1="7" x2="13" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span>Olympus</span>
    </div>

    <div class="sidebar-section">
      <label>Model</label>
      <div class="model-list" id="modelList"></div>
    </div>

    <div class="sidebar-spacer"></div>

    <button class="new-btn" id="newBtn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      New chat
    </button>
  </aside>

  <!-- Chat -->
  <main class="chat">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"></div>
        <h2 id="greeting"></h2>
        <p id="activeModel"></p>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="input" placeholder="Message..." rows="1"></textarea>
        <button id="sendBtn" title="Send">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M12 7L2 2l1.8 5L2 12l10-5z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
// ── Markdown renderer setup ──────────────────────────────────────────────────
const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
  const highlighted = language !== 'plaintext'
    ? hljs.highlight(code, { language }).value
    : hljs.highlightAuto(code).value;
  return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
};
marked.use({ renderer, breaks: true, gfm: true });

// ── State ────────────────────────────────────────────────────────────────────
let isGenerating = false;
let currentAssistantEl = null;
let currentBuffer = '';
let renderScheduled = false;
let currentToolCard = null;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl    = document.getElementById('messages');
const emptyState    = document.getElementById('emptyState');
const greetingEl    = document.getElementById('greeting');
const activeModelEl = document.getElementById('activeModel');
const inputEl       = document.getElementById('input');
const sendBtn       = document.getElementById('sendBtn');
const newBtn        = document.getElementById('newBtn');
const modelList     = document.getElementById('modelList');

// ── Greeting ──────────────────────────────────────────────────────────────────
const GREETINGS = [
  'Howdy.', 'Back to work.', "Let's get started.", 'Welcome.',
  'Top of the morning.', 'Good to see you.', "What's on your mind?", 'Ready when you are.'
];

function setGreeting(modelLabel) {
  greetingEl.textContent = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
  activeModelEl.textContent = modelLabel;
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

// ── Model list ───────────────────────────────────────────────────────────────
async function loadModels() {
  const data = await api('GET', '/api/models');
  modelList.innerHTML = '';
  for (const [key, cfg] of Object.entries(data.models)) {
    const item = document.createElement('div');
    item.className = 'model-item' +
      (key === data.current ? ' active' : '') +
      (!cfg.has_key ? ' no-key' : '');
    item.dataset.key = key;
    item.dataset.label = cfg.label;
    item.innerHTML = `<div class="model-dot"></div><span class="model-name">${esc(cfg.label)}</span>`;
    item.addEventListener('click', () => switchModel(key, cfg.label));
    modelList.appendChild(item);
  }
  const currentLabel = data.models[data.current]?.label || '';
  setGreeting(currentLabel);
}

async function switchModel(key, label) {
  const res = await api('POST', '/api/model', { model_key: key });
  if (res.error) { alert(res.error); return; }
  document.querySelectorAll('.model-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
  setGreeting(label);
  clearChat();
}

// ── Message rendering ─────────────────────────────────────────────────────────
function hideEmpty() {
  emptyState.style.display = 'none';
}

function addUserMessage(content, doScroll = true) {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="user-bubble">${esc(content)}</div>`;
  messagesEl.appendChild(row);
  if (doScroll) scrollBottom();
}

function addAssistantMessage(content) {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `
    <div class="assistant-wrap">
      <div class="assistant-avatar">AI</div>
      <div class="assistant-body">${marked.parse(content)}</div>
    </div>`;
  messagesEl.appendChild(row);
  scrollBottom();
  return row.querySelector('.assistant-body');
}

function startAssistantStream() {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `
    <div class="assistant-wrap">
      <div class="assistant-avatar">AI</div>
      <div class="assistant-body"><span class="cursor"></span></div>
    </div>`;
  messagesEl.appendChild(row);
  currentAssistantEl = row.querySelector('.assistant-body');
  currentBuffer = '';
  scrollBottom();
}

function appendText(chunk) {
  currentBuffer += chunk;
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(() => {
      if (currentAssistantEl) {
        currentAssistantEl.innerHTML = marked.parse(currentBuffer) + '<span class="cursor"></span>';
        scrollBottom();
      }
      renderScheduled = false;
    });
  }
}

function finalizeAssistant() {
  if (currentAssistantEl) {
    currentAssistantEl.innerHTML = marked.parse(currentBuffer || '');
    currentAssistantEl = null;
    currentBuffer = '';
  }
}

function addToolCard(name, args) {
  hideEmpty();
  const firstVal = Object.values(args)[0];
  const preview = firstVal ? String(firstVal).slice(0, 60) : '';

  const row = document.createElement('div');
  row.className = 'msg-row tool-row';

  const card = document.createElement('div');
  card.className = 'tool-card open';
  card.innerHTML = `
    <div class="tool-header">
      <span class="tool-icon">⚙</span>
      <span class="tool-name">${esc(name)}</span>
      <span class="tool-args-preview">${esc(preview)}</span>
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body">
      <div class="tool-args">
        ${Object.entries(args).map(([k, v]) =>
          `<div class="tool-arg-row">
            <span class="tool-arg-key">${esc(k)}</span>
            <span class="tool-arg-val">${esc(String(v))}</span>
          </div>`
        ).join('')}
      </div>
      <div class="tool-result loading">Running...</div>
    </div>`;

  card.querySelector('.tool-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  row.appendChild(card);
  messagesEl.appendChild(row);
  scrollBottom();
  return card;
}

function setToolResult(card, result) {
  const resultEl = card.querySelector('.tool-result');
  if (!resultEl) return;
  resultEl.className = 'tool-result';
  const lines = result.split('\n');
  const preview = lines.slice(0, 8).join('\n');
  const extra = lines.length > 8 ? `\n... (${lines.length - 8} more lines)` : '';
  resultEl.textContent = preview + extra;
  scrollBottom();
}

function addError(msg) {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `<div class="error-msg">Error: ${esc(msg)}</div>`;
  messagesEl.appendChild(row);
  scrollBottom();
}

// ── SSE stream handler ────────────────────────────────────────────────────────
function handleEvent(type, data) {
  if (type === 'text') {
    if (!currentAssistantEl) startAssistantStream();
    appendText(data);
  } else if (type === 'tool_start') {
    finalizeAssistant();
    currentToolCard = addToolCard(data.name, data.args);
  } else if (type === 'tool_result') {
    if (currentToolCard) {
      setToolResult(currentToolCard, data.result);
      currentToolCard = null;
    }
  } else if (type === 'done') {
    finalizeAssistant();
    setGenerating(false);
  } else if (type === 'error') {
    finalizeAssistant();
    addError(data);
    setGenerating(false);
  }
}

// ── Send ──────────────────────────────────────────────────────────────────────
function setGenerating(val) {
  isGenerating = val;
  inputEl.disabled = val;
  sendBtn.disabled = false;
  if (val) {
    sendBtn.classList.add('stop');
    sendBtn.title = 'Stop';
    sendBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 11 11"><rect width="11" height="11" rx="2" fill="white"/></svg>`;
  } else {
    sendBtn.classList.remove('stop');
    sendBtn.title = 'Send';
    sendBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7L2 2l1.8 5L2 12l10-5z" fill="white"/></svg>`;
    inputEl.focus();
  }
}

async function sendMessage() {
  const content = inputEl.value.trim();
  if (!content || isGenerating) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addUserMessage(content);
  setGenerating(true);
  currentAssistantEl = null;
  currentBuffer = '';
  currentToolCard = null;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const { type, data } = JSON.parse(line.slice(6));
          handleEvent(type, data);
        } catch (_) {}
      }
    }
  } catch (err) {
    addError(err.message);
    setGenerating(false);
  }
}

// ── New chat ──────────────────────────────────────────────────────────────────
function clearChat() {
  while (messagesEl.firstChild) messagesEl.removeChild(messagesEl.firstChild);
  messagesEl.appendChild(emptyState);
  emptyState.style.display = '';
  currentAssistantEl = null;
  currentBuffer = '';
  currentToolCard = null;
}

newBtn.addEventListener('click', async () => {
  if (isGenerating) return;
  await api('POST', '/api/new');
  clearChat();
});

// ── Input auto-resize + Enter to send ────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadModels();
  inputEl.focus();
})();
</script>
</body>
</html>

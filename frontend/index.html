<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0c0c0c;
    --sidebar-bg:  #111111;
    --surface:     #1a1a1a;
    --surface-2:   #222222;
    --border:      #2a2a2a;
    --text:        #e2e2e2;
    --text-dim:    #777;
    --text-dimmer: #444;
    --accent:      #6366f1;
    --accent-dim:  #3730a3;
    --user-bg:     #1b3358;
    --user-text:   #bfdbfe;
    --tool-bg:     #130f20;
    --tool-border: #4c1d95;
    --error:       #f87171;
    --radius:      10px;
    --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono:        'SF Mono', 'JetBrains Mono', Menlo, monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    gap: 24px;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 2px 0 4px;
  }
  .sidebar-logo svg { flex-shrink: 0; opacity: .9; }
  .sidebar-logo span {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .sidebar-section label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    display: block;
    margin-bottom: 8px;
    padding: 0 6px;
  }

  .model-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .model-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .model-item:hover { background: var(--surface); }
  .model-item.active {
    background: var(--surface);
    border-color: var(--border);
  }
  .model-item.active .model-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .model-item.no-key { opacity: .4; pointer-events: none; }

  .model-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dimmer);
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .model-name {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-spacer { flex: 1; }

  .new-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .new-btn:hover { background: var(--surface-2); border-color: #3a3a3a; }
  .new-btn svg { opacity: .7; }

  /* ── Chat area ────────────────────────────── */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: var(--text-dim);
    user-select: none;
  }
  .empty-state svg { opacity: .25; }
  .empty-state h2 {
    font-size: 20px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: -0.3px;
  }
  .empty-state p { font-size: 13px; color: var(--text-dimmer); }

  /* Message rows */
  .msg-row {
    display: flex;
    padding: 6px 32px;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg-row.tool-row { justify-content: flex-start; }

  /* User bubble */
  .user-bubble {
    background: var(--user-bg);
    color: var(--user-text);
    padding: 10px 15px;
    border-radius: 16px 16px 4px 16px;
    max-width: 72%;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Assistant message */
  .assistant-wrap {
    display: flex;
    gap: 11px;
    max-width: 80%;
    align-items: flex-start;
  }
  .assistant-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
    letter-spacing: -.5px;
  }
  .assistant-body {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    word-break: break-word;
    min-width: 0;
  }

  /* Markdown styles inside assistant body */
  .assistant-body p { margin: 0 0 10px; }
  .assistant-body p:last-child { margin-bottom: 0; }
  .assistant-body h1, .assistant-body h2, .assistant-body h3 {
    margin: 16px 0 6px; font-weight: 600; color: var(--text);
  }
  .assistant-body h1 { font-size: 18px; }
  .assistant-body h2 { font-size: 16px; }
  .assistant-body h3 { font-size: 14px; }
  .assistant-body ul, .assistant-body ol {
    padding-left: 20px; margin: 6px 0 10px;
  }
  .assistant-body li { margin-bottom: 3px; }
  .assistant-body code {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: #c4b5fd;
  }
  .assistant-body pre {
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .assistant-body pre code {
    background: none; border: none; padding: 0;
    font-size: 12.5px; color: inherit; border-radius: 0;
  }
  .assistant-body blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 8px 0;
  }
  .assistant-body table {
    border-collapse: collapse; width: 100%; margin: 8px 0;
  }
  .assistant-body th, .assistant-body td {
    border: 1px solid var(--border); padding: 6px 10px; font-size: 13px;
  }
  .assistant-body th { background: var(--surface); font-weight: 600; }
  .assistant-body a { color: #818cf8; text-decoration: none; }
  .assistant-body a:hover { text-decoration: underline; }
  .assistant-body strong { color: #f0f0f0; font-weight: 600; }
  .assistant-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* Typing cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Tool call card */
  .tool-card {
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 8px;
    overflow: hidden;
    max-width: 600px;
    width: 100%;
    font-size: 12.5px;
  }
  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(76,29,149,.25);
    cursor: pointer;
    user-select: none;
  }
  .tool-header:hover { background: rgba(76,29,149,.4); }
  .tool-icon { font-size: 13px; }
  .tool-name { font-weight: 600; color: #c4b5fd; font-family: var(--mono); }
  .tool-args-preview { color: var(--text-dimmer); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-chevron { color: var(--text-dimmer); font-size: 10px; transition: transform .2s; margin-left: auto; }
  .tool-card.open .tool-chevron { transform: rotate(90deg); }

  .tool-body { display: none; }
  .tool-card.open .tool-body { display: block; }

  .tool-args {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(76,29,149,.3);
    font-family: var(--mono);
    color: var(--text-dim);
    font-size: 12px;
  }
  .tool-arg-row { display: flex; gap: 8px; }
  .tool-arg-key { color: #a78bfa; }
  .tool-arg-val { color: #e2e2e2; white-space: pre-wrap; word-break: break-all; }

  .tool-result {
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: #a3e635;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }
  .tool-result.loading { color: var(--text-dimmer); font-style: italic; }
  .tool-result::-webkit-scrollbar { width: 4px; }
  .tool-result::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Error */
  .error-msg {
    padding: 10px 14px;
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    border-radius: 8px;
    color: var(--error);
    font-size: 13px;
    max-width: 80%;
  }

  /* Input bar */
  .input-bar {
    padding: 16px 32px 20px;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
  }
  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px 10px 16px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  textarea#input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.55;
    resize: none;
    max-height: 200px;
    min-height: 22px;
    overflow-y: auto;
  }
  textarea#input::placeholder { color: var(--text-dimmer); }
  textarea#input::-webkit-scrollbar { width: 4px; }
  textarea#input::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  #sendBtn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s, opacity .15s;
  }
  #sendBtn:hover { background: #818cf8; }
  #sendBtn:disabled { opacity: .4; cursor: default; }
  #sendBtn.stop { background: #dc2626; }
  #sendBtn.stop:hover { background: #ef4444; }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" stroke="#6366f1" stroke-width="1.5"/>
        <circle cx="11" cy="11" r="4" fill="#6366f1"/>
        <line x1="11" y1="1" x2="11" y2="5" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="11" y1="17" x2="11" y2="21" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1" y1="11" x2="5" y2="11" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="17" y1="11" x2="21" y2="11" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>Olympus</span>
    </div>

    <div class="sidebar-section">
      <label>Model</label>
      <div class="model-list" id="modelList"></div>
    </div>

    <div class="sidebar-spacer"></div>

    <button class="new-btn" id="newBtn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      New chat
    </button>
  </aside>

  <!-- Chat -->
  <main class="chat">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="#6366f1" stroke-width="2"/>
          <circle cx="24" cy="24" r="9" fill="#6366f1"/>
          <line x1="24" y1="2" x2="24" y2="11" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
          <line x1="24" y1="37" x2="24" y2="46" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
          <line x1="2" y1="24" x2="11" y2="24" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
          <line x1="37" y1="24" x2="46" y2="24" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2>Olympus</h2>
        <p>Ask anything — I can code, search the web, and run commands on your Mac.</p>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="input" placeholder="Message..." rows="1"></textarea>
        <button id="sendBtn" title="Send">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M13 7.5L2 2l2 5.5-2 5.5 11-5.5z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script>
// ── Markdown renderer setup ──────────────────────────────────────────────────
const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
  const highlighted = language !== 'plaintext'
    ? hljs.highlight(code, { language }).value
    : hljs.highlightAuto(code).value;
  return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
};
marked.use({ renderer, breaks: true, gfm: true });

// ── State ────────────────────────────────────────────────────────────────────
let isGenerating = false;
let currentAssistantEl = null;
let currentBuffer = '';
let renderScheduled = false;
let currentToolCard = null;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const emptyState  = document.getElementById('emptyState');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('sendBtn');
const newBtn      = document.getElementById('newBtn');
const modelList   = document.getElementById('modelList');

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

// ── Model list ───────────────────────────────────────────────────────────────
async function loadModels() {
  const data = await api('GET', '/api/models');
  modelList.innerHTML = '';
  for (const [key, cfg] of Object.entries(data.models)) {
    const item = document.createElement('div');
    item.className = 'model-item' +
      (key === data.current ? ' active' : '') +
      (!cfg.has_key ? ' no-key' : '');
    item.dataset.key = key;
    item.innerHTML = `<div class="model-dot"></div><span class="model-name">${esc(cfg.label)}</span>`;
    item.addEventListener('click', () => switchModel(key));
    modelList.appendChild(item);
  }
}

async function switchModel(key) {
  const res = await api('POST', '/api/model', { model_key: key });
  if (res.error) { alert(res.error); return; }
  document.querySelectorAll('.model-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
}

// ── History restore ───────────────────────────────────────────────────────────
async function loadHistory() {
  const data = await api('GET', '/api/history');
  if (!data.messages || data.messages.length === 0) return;
  hideEmpty();
  for (const item of data.messages) {
    if (item.type === 'user') {
      addUserMessage(item.content, false);
    } else if (item.type === 'assistant') {
      addAssistantMessage(item.content);
    } else if (item.type === 'tool') {
      const card = addToolCard(item.name, item.args);
      if (item.result) setToolResult(card, item.result);
    }
  }
  scrollBottom();
}

// ── Message rendering ─────────────────────────────────────────────────────────
function hideEmpty() {
  emptyState.style.display = 'none';
}

function addUserMessage(content, doScroll = true) {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="user-bubble">${esc(content)}</div>`;
  messagesEl.appendChild(row);
  if (doScroll) scrollBottom();
}

function addAssistantMessage(content) {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `
    <div class="assistant-wrap">
      <div class="assistant-avatar">AI</div>
      <div class="assistant-body">${marked.parse(content)}</div>
    </div>`;
  messagesEl.appendChild(row);
  scrollBottom();
  return row.querySelector('.assistant-body');
}

function startAssistantStream() {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `
    <div class="assistant-wrap">
      <div class="assistant-avatar">AI</div>
      <div class="assistant-body"><span class="cursor"></span></div>
    </div>`;
  messagesEl.appendChild(row);
  currentAssistantEl = row.querySelector('.assistant-body');
  currentBuffer = '';
  scrollBottom();
}

function appendText(chunk) {
  currentBuffer += chunk;
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(() => {
      if (currentAssistantEl) {
        currentAssistantEl.innerHTML = marked.parse(currentBuffer) + '<span class="cursor"></span>';
        scrollBottom();
      }
      renderScheduled = false;
    });
  }
}

function finalizeAssistant() {
  if (currentAssistantEl) {
    currentAssistantEl.innerHTML = marked.parse(currentBuffer || '');
    currentAssistantEl = null;
    currentBuffer = '';
  }
}

function addToolCard(name, args) {
  hideEmpty();
  // Short preview of args for collapsed header
  const firstVal = Object.values(args)[0];
  const preview = firstVal ? String(firstVal).slice(0, 60) : '';

  const row = document.createElement('div');
  row.className = 'msg-row tool-row';

  const card = document.createElement('div');
  card.className = 'tool-card open';
  card.innerHTML = `
    <div class="tool-header">
      <span class="tool-icon">⚙</span>
      <span class="tool-name">${esc(name)}</span>
      <span class="tool-args-preview">${esc(preview)}</span>
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body">
      <div class="tool-args">
        ${Object.entries(args).map(([k, v]) =>
          `<div class="tool-arg-row">
            <span class="tool-arg-key">${esc(k)}</span>
            <span class="tool-arg-val">${esc(String(v))}</span>
          </div>`
        ).join('')}
      </div>
      <div class="tool-result loading">Running...</div>
    </div>`;

  card.querySelector('.tool-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  row.appendChild(card);
  messagesEl.appendChild(row);
  scrollBottom();
  return card;
}

function setToolResult(card, result) {
  const resultEl = card.querySelector('.tool-result');
  if (!resultEl) return;
  resultEl.className = 'tool-result';
  const lines = result.split('\n');
  const preview = lines.slice(0, 8).join('\n');
  const extra = lines.length > 8 ? `\n... (${lines.length - 8} more lines)` : '';
  resultEl.textContent = preview + extra;
  scrollBottom();
}

function addError(msg) {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `<div class="error-msg">Error: ${esc(msg)}</div>`;
  messagesEl.appendChild(row);
  scrollBottom();
}

// ── SSE stream handler ────────────────────────────────────────────────────────
function handleEvent(type, data) {
  if (type === 'text') {
    if (!currentAssistantEl) startAssistantStream();
    appendText(data);

  } else if (type === 'tool_start') {
    finalizeAssistant();
    currentToolCard = addToolCard(data.name, data.args);

  } else if (type === 'tool_result') {
    if (currentToolCard) {
      setToolResult(currentToolCard, data.result);
      currentToolCard = null;
    }

  } else if (type === 'done') {
    finalizeAssistant();
    setGenerating(false);

  } else if (type === 'error') {
    finalizeAssistant();
    addError(data);
    setGenerating(false);
  }
}

// ── Send ──────────────────────────────────────────────────────────────────────
function setGenerating(val) {
  isGenerating = val;
  inputEl.disabled = val;
  sendBtn.disabled = false;
  if (val) {
    sendBtn.classList.add('stop');
    sendBtn.title = 'Stop';
    sendBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12"><rect width="12" height="12" rx="2" fill="white"/></svg>`;
  } else {
    sendBtn.classList.remove('stop');
    sendBtn.title = 'Send';
    sendBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M13 7.5L2 2l2 5.5-2 5.5 11-5.5z" fill="white"/></svg>`;
    inputEl.focus();
  }
}

async function sendMessage() {
  const content = inputEl.value.trim();
  if (!content || isGenerating) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addUserMessage(content);
  setGenerating(true);
  currentAssistantEl = null;
  currentBuffer = '';
  currentToolCard = null;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const { type, data } = JSON.parse(line.slice(6));
          handleEvent(type, data);
        } catch (_) {}
      }
    }
  } catch (err) {
    addError(err.message);
    setGenerating(false);
  }
}

// ── New chat ──────────────────────────────────────────────────────────────────
newBtn.addEventListener('click', async () => {
  if (isGenerating) return;
  await api('POST', '/api/new');
  // Clear messages but keep empty state hidden toggle
  while (messagesEl.firstChild) messagesEl.removeChild(messagesEl.firstChild);
  messagesEl.appendChild(emptyState);
  emptyState.style.display = '';
});

// ── Input auto-resize + Enter to send ────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await Promise.all([loadModels(), loadHistory()]);
  inputEl.focus();
})();
</script>
